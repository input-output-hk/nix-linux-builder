# nix-linux-builder CI
# - macOS: build host binary, run unit tests, static analysis
# - Linux ARM64: build guest kernel and initrd
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── Host binary (macOS, aarch64-darwin) ──────────────────────────────
  host:
    name: Host (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-darwin-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-darwin-

      - name: Build
        run: nix develop -c make build

      - name: Unit tests
        run: nix develop -c make test

      - name: clang-tidy
        run: nix develop -c make lint

      - name: Unit tests (AddressSanitizer)
        run: nix develop -c make test-asan

      - name: Unit tests (UndefinedBehaviorSanitizer)
        run: nix develop -c make test-ubsan

  # ── Guest components (Linux, aarch64-linux) ──────────────────────────
  guest:
    name: Guest (Linux ARM64)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-linux-arm64-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-linux-arm64-

      - name: Build guest kernel
        run: nix build -L .#packages.aarch64-linux.guest-kernel

      - name: Build guest initrd
        run: nix build -L .#packages.aarch64-linux.guest-initrd
